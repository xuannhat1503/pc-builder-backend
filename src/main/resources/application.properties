spring.application.name=backend

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/pc_builder?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

server.port=${PORT:8080}

tavily.api-key=${TAVILY_API_KEY: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}
tavily.base-url=${TAVILY_BASE_URL:https://api.tavily.com/search}
tavily.search-depth=${TAVILY_SEARCH_DEPTH:advanced}
tavily.topic=${TAVILY_TOPIC:general}
tavily.max-results=${TAVILY_MAX_RESULTS:5}
tavily.include-answer=${TAVILY_INCLUDE_ANSWER:true}
tavily.include-raw-content=${TAVILY_INCLUDE_RAW_CONTENT:true}
tavily.connect-timeout-millis=${TAVILY_CONNECT_TIMEOUT_MILLIS:15000}
tavily.read-timeout-millis=${TAVILY_READ_TIMEOUT_MILLIS:30000}
