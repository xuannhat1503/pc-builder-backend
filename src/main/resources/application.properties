spring.application.name=backend

spring.datasource.url=${SPRING_DATASOURCE_URL}

spring.datasource.username=${SPRING_DATASOURCE_USERNAME}

spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

server.port=${PORT:8080}

tavily.api-key=${TAVILY_API_KEY}
tavily.base-url=https://api.tavily.com/search
tavily.search-depth=advanced
tavily.topic=general
tavily.max-results=5
tavily.include-answer=true
tavily.include-raw-content=true
tavily.connect-timeout-millis=15000
tavily.read-timeout-millis=30000
